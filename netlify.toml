[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_PUBLISHABLE_KEY"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# CTFd Sync API
[[redirects]]
  from = "/api/ctfd/sync"
  to = "/.netlify/functions/ctfd-sync"
  status = 200

# SPA fallback for React Router (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
